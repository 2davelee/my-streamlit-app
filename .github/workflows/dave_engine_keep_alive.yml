name: Dave Engine 8-Hour Pulse

on:
  schedule:
    # 8시간마다 실행 (UTC 00:00, 08:00, 16:00 -> KST 09:00, 17:01, 01:00)
    - cron: '0 */8 * * *'
  workflow_dispatch: # 테스트를 위해 수동 실행 버튼 활성화

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager requests

      - name: Run Dave Engine Poking Script
        run: python .github/scripts/poke_engine.py